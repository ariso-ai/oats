name: Desktop App

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel in-flight release builds — they may be signing/notarizing.
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  validate:
    name: Validate (frontend + cargo build)
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-aarch64-apple-darwin-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-aarch64-apple-darwin-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build frontend
        run: npm run vite:build

      # The ariso-stt Swift sidecar is a build artifact (not committed) that
      # tauri's `externalBin` requires to exist before `cargo build`. It lives
      # under the gitignored binaries/ dir. Building it compiles the heavy MLX
      # dependency tree from scratch (~25 min), but its inputs — Package.resolved
      # and Sources/ — rarely change, so cache the produced artifacts keyed on
      # their hash and skip the build entirely on a hit. Exact-match key only
      # (no restore-keys): a partial restore would yield artifacts that don't
      # match the current source.
      - name: Cache ariso-stt sidecar artifacts
        id: sidecar-cache
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/binaries/ariso-stt-aarch64-apple-darwin
            src-tauri/binaries/mlx-swift_Cmlx.bundle
          key: ariso-stt-aarch64-${{ hashFiles('src-tauri/ariso-stt/Package.resolved', 'src-tauri/ariso-stt/Sources/**') }}

      # On a cache miss, build once with xcodebuild. It emits both the
      # executable and the MLX metallib bundle (mlx-swift_Cmlx.bundle, referenced
      # by tauri.conf.json's bundle.resources) into Build/Products/Release. A
      # separate `swift build` is redundant — `swift build` can't compile MLX's
      # Metal shaders anyway, and xcodebuild's executable already expects the
      # metallib bundle beside it — so build once and copy both products out.
      - name: Build ariso-stt sidecar
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        working-directory: src-tauri/ariso-stt
        run: |
          mkdir -p ../binaries
          xcodebuild build -scheme ariso-stt -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .xcode -skipMacroValidation
          cp .xcode/Build/Products/Release/ariso-stt ../binaries/ariso-stt-aarch64-apple-darwin
          cp -R .xcode/Build/Products/Release/mlx-swift_Cmlx.bundle ../binaries/

      - name: Build Rust
        working-directory: src-tauri
        run: cargo build --locked

  release:
    name: Sign, notarize, and bundle
    needs: validate
    if: github.event_name == 'release'
    runs-on: [self-hosted, macOS, ARM64]
    # `release` environment holds the Apple signing/notarization secrets and
    # the required-reviewer protection rule (see README → Signing & Notarization).
    environment: release
    permissions:
      contents: write
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-aarch64-apple-darwin-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-aarch64-apple-darwin-

      - name: Install dependencies
        run: npm ci --prefer-offline

      # Same as the validate job: the sidecar is a gitignored build artifact
      # that `tauri:build` (via externalBin) needs present before bundling.
      # The artifact cache (keyed on Package.resolved + Sources/) is shared with
      # the validate job, so this usually restores instantly. On a miss, a single
      # xcodebuild emits both the executable and the MLX metallib bundle
      # (mlx-swift_Cmlx.bundle): without the bundle the notes (LLM) backend fails
      # at runtime with "Failed to load the default metallib", and bundle.resources
      # ships it into the .app. `swift build` is redundant (it can't compile MLX's
      # Metal shaders), so build once with xcodebuild and copy both products out.
      - name: Cache ariso-stt sidecar artifacts
        id: sidecar-cache
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/binaries/ariso-stt-aarch64-apple-darwin
            src-tauri/binaries/mlx-swift_Cmlx.bundle
          key: ariso-stt-aarch64-${{ hashFiles('src-tauri/ariso-stt/Package.resolved', 'src-tauri/ariso-stt/Sources/**') }}

      - name: Build ariso-stt sidecar
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        working-directory: src-tauri/ariso-stt
        run: |
          mkdir -p ../binaries
          xcodebuild build -scheme ariso-stt -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .xcode -skipMacroValidation
          cp .xcode/Build/Products/Release/ariso-stt ../binaries/ariso-stt-aarch64-apple-darwin
          cp -R .xcode/Build/Products/Release/mlx-swift_Cmlx.bundle ../binaries/

      - name: Build, sign, and notarize
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build -- -- --features prod-api

      - name: Generate latest.json updater manifest
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_NAME: ${{ github.event.release.name }}
        run: |
          set -euo pipefail

          # Locate the updater artifacts the bundler produced. Tauri v2
          # writes these to src-tauri/target/release/bundle/macos/. Cached
          # builds can leave stale tarballs alongside the fresh one, so
          # require exactly one match and fail loudly otherwise.
          mapfile -t TARBALLS < <(find src-tauri/target/release/bundle/macos -maxdepth 1 -type f -name '*.app.tar.gz' | sort)
          if [[ "${#TARBALLS[@]}" -ne 1 ]]; then
            echo "Expected exactly 1 updater tarball, found ${#TARBALLS[@]}:" >&2
            printf ' - %s\n' "${TARBALLS[@]}" >&2
            exit 1
          fi
          TARBALL="${TARBALLS[0]}"
          SIGFILE="${TARBALL}.sig"

          # The version in tauri.conf.json (strip leading 'v' from tag).
          VERSION="${RELEASE_TAG#v}"

          # Asset URL is the stable R2 path the updater downloads the payload
          # from. The object at this key is overwritten by the Publish to R2 step.
          ASSET_URL="https://pub-dd2807d512d34e55b8a863f675ea8e6e.r2.dev/desktop/Ariso.app.tar.gz"

          # Read the detached signature contents (single line of base64).
          SIG=$(cat "$SIGFILE")

          # Mandatory flag: derived from the release title containing "[mandatory]".
          if [[ "$RELEASE_NAME" == *"[mandatory]"* ]]; then
            MANDATORY="true"
          else
            MANDATORY="false"
          fi

          # Build the manifest using jq to ensure valid JSON escaping
          # of the (possibly multi-line) release body.
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$RELEASE_BODY" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson mandatory "$MANDATORY" \
            --arg signature "$SIG" \
            --arg url "$ASSET_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              mandatory: $mandatory,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

      - name: Publish artifacts to R2
        run: |
          set -euo pipefail

          # Ensure the AWS CLI is available on the self-hosted runner.
          if ! command -v aws >/dev/null 2>&1; then
            echo "AWS CLI not found on runner; install with 'brew install awscli'." >&2
            exit 1
          fi

          # Re-locate the bundler outputs (same logic as the manifest step).
          mapfile -t TARBALLS < <(find src-tauri/target/release/bundle/macos -maxdepth 1 -type f -name '*.app.tar.gz' | sort)
          if [[ "${#TARBALLS[@]}" -ne 1 ]]; then
            echo "Expected exactly 1 updater tarball, found ${#TARBALLS[@]}." >&2
            exit 1
          fi
          TARBALL="${TARBALLS[0]}"

          mapfile -t DMGS < <(find src-tauri/target/release/bundle/dmg -maxdepth 1 -type f -name '*.dmg' | sort)
          if [[ "${#DMGS[@]}" -ne 1 ]]; then
            echo "Expected exactly 1 DMG, found ${#DMGS[@]}." >&2
            exit 1
          fi
          DMG="${DMGS[0]}"

          NOCACHE="no-cache, max-age=0, must-revalidate"

          # Upload payloads BEFORE the manifest that references them, so a client
          # reading the new latest.json never points at a missing object.
          aws s3 cp "$TARBALL" "s3://${R2_BUCKET}/desktop/Ariso.app.tar.gz" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/gzip \
            --cache-control "$NOCACHE"

          aws s3 cp "$DMG" "s3://${R2_BUCKET}/desktop/Ariso.dmg" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/x-apple-diskimage \
            --cache-control "$NOCACHE"

          aws s3 cp latest.json "s3://${R2_BUCKET}/desktop/latest.json" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/json \
            --cache-control "$NOCACHE"

      - name: Add R2 download link to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          append_body: true
          body: |

            ---
            **Download:** https://pub-dd2807d512d34e55b8a863f675ea8e6e.r2.dev/desktop/Ariso.dmg
