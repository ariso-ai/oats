name: Desktop App

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      features:
        description: "Cargo feature for API endpoint"
        type: choice
        options:
          - prod-api
          - dev-api
          - default
        default: prod-api

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: [self-hosted, macOS, ARM64]
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-${{ matrix.target }}-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build frontend (unsigned validation)
        if: github.event_name != 'workflow_dispatch'
        run: npm run vite:build

      - name: Build, sign, and notarize
        if: github.event_name == 'workflow_dispatch'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ inputs.features }}" = "default" ]; then
            npm run tauri:build
          else
            npm run tauri:build -- -- --features ${{ inputs.features }}
          fi

      - name: Upload signed bundle
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ariso-desktop-${{ matrix.target }}-${{ inputs.features }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
          retention-days: 14
