name: Desktop App

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

# Signing, notarization, and publishing live in release.yaml; this workflow is
# CI validation only, so superseded runs are safe to cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (frontend + cargo build)
    # macos-15 is a GitHub-hosted Apple Silicon (arm64) runner; macos-13 is Intel.
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: rust-aarch64-apple-darwin-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-aarch64-apple-darwin-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build frontend
        run: npm run vite:build

      # The ariso-stt Swift sidecar is a build artifact (not committed) that
      # tauri's `externalBin` requires to exist before `cargo build`. It lives
      # under the gitignored binaries/ dir. Building it compiles the heavy MLX
      # dependency tree from scratch (~25 min), but its inputs — Package.resolved
      # and Sources/ — rarely change, so cache the produced artifacts keyed on
      # their hash and skip the build entirely on a hit. Exact-match key only
      # (no restore-keys): a partial restore would yield artifacts that don't
      # match the current source.
      - name: Cache ariso-stt sidecar artifacts
        id: sidecar-cache
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/binaries/ariso-stt-aarch64-apple-darwin
            src-tauri/binaries/mlx-swift_Cmlx.bundle
          key: ariso-stt-aarch64-${{ hashFiles('src-tauri/ariso-stt/Package.resolved', 'src-tauri/ariso-stt/Sources/**') }}

      # On a cache miss, build once with xcodebuild. It emits both the
      # executable and the MLX metallib bundle (mlx-swift_Cmlx.bundle, referenced
      # by tauri.conf.json's bundle.resources) into Build/Products/Release. A
      # separate `swift build` is redundant — `swift build` can't compile MLX's
      # Metal shaders anyway, and xcodebuild's executable already expects the
      # metallib bundle beside it — so build once and copy both products out.
      - name: Build ariso-stt sidecar
        if: steps.sidecar-cache.outputs.cache-hit != 'true'
        working-directory: src-tauri/ariso-stt
        run: |
          mkdir -p ../binaries
          xcodebuild build -scheme ariso-stt -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .xcode -skipMacroValidation
          cp .xcode/Build/Products/Release/ariso-stt ../binaries/ariso-stt-aarch64-apple-darwin
          cp -R .xcode/Build/Products/Release/mlx-swift_Cmlx.bundle ../binaries/

      - name: Build Rust
        working-directory: src-tauri
        run: cargo build --locked
