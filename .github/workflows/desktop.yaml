name: Desktop App

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Don't cancel in-flight release builds — they may be signing/notarizing.
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  validate:
    name: Validate (frontend + cargo build)
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-aarch64-apple-darwin-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-aarch64-apple-darwin-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build frontend
        run: npm run vite:build

      - name: Build Rust
        working-directory: src-tauri
        run: cargo build --locked

  release:
    name: Sign, notarize, and bundle
    needs: validate
    if: github.event_name == 'release'
    runs-on: [self-hosted, macOS, ARM64]
    # `release` environment holds the Apple signing/notarization secrets and
    # the required-reviewer protection rule (see README → Signing & Notarization).
    environment: release
    permissions:
      contents: write
    env:
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version: '24'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-aarch64-apple-darwin-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            rust-aarch64-apple-darwin-

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build, sign, and notarize
        run: npm run tauri:build -- -- --features prod-api

      - name: Generate latest.json updater manifest
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_NAME: ${{ github.event.release.name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Locate the updater artifacts the bundler produced. Tauri v2
          # writes these to src-tauri/target/release/bundle/macos/.
          TARBALL=$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz)
          SIGFILE="${TARBALL}.sig"
          BASENAME=$(basename "$TARBALL")

          # The version in tauri.conf.json (strip leading 'v' from tag).
          VERSION="${RELEASE_TAG#v}"

          # Asset URL is the release-asset download URL on GitHub.
          ASSET_URL="https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${BASENAME}"

          # Read the detached signature contents (single line of base64).
          SIG=$(cat "$SIGFILE")

          # Mandatory flag: derived from the release title containing "[mandatory]".
          if [[ "$RELEASE_NAME" == *"[mandatory]"* ]]; then
            MANDATORY="true"
          else
            MANDATORY="false"
          fi

          # Build the manifest using jq to ensure valid JSON escaping
          # of the (possibly multi-line) release body.
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$RELEASE_BODY" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson mandatory "$MANDATORY" \
            --arg signature "$SIG" \
            --arg url "$ASSET_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              mandatory: $mandatory,
              platforms: {
                "darwin-aarch64": {
                  signature: $signature,
                  url: $url
                }
              }
            }' > latest.json

          # Also copy the tarball and sig to repo root so the upload glob
          # below picks them up alongside the DMG.
          cp "$TARBALL" "$SIGFILE" .

      - name: Attach signed DMG + updater manifest to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            *.app.tar.gz
            *.app.tar.gz.sig
            latest.json
          fail_on_unmatched_files: true
